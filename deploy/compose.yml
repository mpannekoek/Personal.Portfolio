services:
  app:
    image: ${IMAGE_REFERENCE:?IMAGE_REFERENCE is required}
    container_name: ${COMPOSE_PROJECT_NAME:-personal-portfolio}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_ORIGIN: http://127.0.0.1:3001
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
