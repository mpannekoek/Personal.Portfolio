name: Deploy To Linux VPS

on:
  workflow_run:
    workflows:
      - Publish Docker Image
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Exact container tag to deploy
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-azure-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT || 22 }}
      VPS_APP_PATH: ${{ vars.VPS_APP_PATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve image reference
        shell: bash
        run: |
          set -euo pipefail

          repo_lower="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_tag="${{ inputs.image_tag }}"
          else
            workflow_run_sha="${{ github.event.workflow_run.head_sha }}"

            if [ -z "${workflow_run_sha}" ]; then
              echo "Missing workflow_run.head_sha from Publish Docker Image event." >&2
              exit 1
            fi

            image_tag="sha-$(printf '%s' "${workflow_run_sha}" | cut -c1-7)"
          fi

          if [ -z "${image_tag}" ]; then
            echo "An explicit image tag is required for deployment." >&2
            exit 1
          fi

          echo "IMAGE_NAME=${repo_lower}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${image_tag}" >> "${GITHUB_ENV}"
          echo "IMAGE_REFERENCE=${REGISTRY}/${repo_lower}:${image_tag}" >> "${GITHUB_ENV}"

      - name: Validate deployment settings
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?VPS_HOST repository variable is required}"
          : "${VPS_USER:?VPS_USER repository variable is required}"
          : "${VPS_PORT:?VPS_PORT repository variable is required}"
          : "${VPS_APP_PATH:?VPS_APP_PATH repository variable is required}"
          : "${VPS_SSH_PRIVATE_KEY:?VPS_SSH_PRIVATE_KEY repository secret is required}"

      - name: Copy deploy files to VPS
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          key_file="$(mktemp)"
          known_hosts_file="$(mktemp)"
          askpass_file="$(mktemp)"
          eval "$(ssh-agent -s)" >/dev/null
          trap 'rm -f "${key_file}" "${known_hosts_file}" "${askpass_file}"; ssh-agent -k >/dev/null' EXIT

          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" | tr -d '\r' > "${key_file}"
          chmod 600 "${key_file}"

          cat > "${askpass_file}" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "${VPS_SSH_PASSPHRASE:-}"
          EOF
          chmod 700 "${askpass_file}"

          if ! SSH_ASKPASS="${askpass_file}" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 ssh-add "${key_file}" < /dev/null; then
            if [ -z "${VPS_SSH_PASSPHRASE:-}" ]; then
              echo "Failed to add SSH key. If your key is encrypted, set the VPS_SSH_PASSPHRASE secret."
            else
              echo "Failed to add SSH key. Check whether VPS_SSH_PASSPHRASE matches the key passphrase."
            fi
            exit 1
          fi

          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" > "${known_hosts_file}"

          ssh \
            -p "${VPS_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${known_hosts_file}" \
            "${VPS_USER}@${VPS_HOST}" \
            bash -s -- "${VPS_APP_PATH}" <<'EOF'
          set -euo pipefail
          mkdir -p "$1/deploy"
          EOF

          scp \
            -P "${VPS_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${known_hosts_file}" \
            deploy/compose.yml \
            deploy/deploy.sh \
            "${VPS_USER}@${VPS_HOST}:${VPS_APP_PATH}/deploy/"

      - name: Run deploy script on VPS
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          key_file="$(mktemp)"
          known_hosts_file="$(mktemp)"
          askpass_file="$(mktemp)"
          eval "$(ssh-agent -s)" >/dev/null
          trap 'rm -f "${key_file}" "${known_hosts_file}" "${askpass_file}"; ssh-agent -k >/dev/null' EXIT

          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" | tr -d '\r' > "${key_file}"
          chmod 600 "${key_file}"

          cat > "${askpass_file}" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "${VPS_SSH_PASSPHRASE:-}"
          EOF
          chmod 700 "${askpass_file}"

          if ! SSH_ASKPASS="${askpass_file}" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 ssh-add "${key_file}" < /dev/null; then
            if [ -z "${VPS_SSH_PASSPHRASE:-}" ]; then
              echo "Failed to add SSH key. If your key is encrypted, set the VPS_SSH_PASSPHRASE secret."
            else
              echo "Failed to add SSH key. Check whether VPS_SSH_PASSPHRASE matches the key passphrase."
            fi
            exit 1
          fi

          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" > "${known_hosts_file}"

          ssh \
            -p "${VPS_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${known_hosts_file}" \
            "${VPS_USER}@${VPS_HOST}" \
            bash -s -- "${VPS_APP_PATH}/deploy/deploy.sh" "${IMAGE_TAG}" "${IMAGE_NAME}" "${REGISTRY}" "${VPS_APP_PATH}" <<'EOF'
          set -euo pipefail
          chmod 700 "$1"
          bash "$1" "$2" "$3" "$4" "$5"
          EOF
